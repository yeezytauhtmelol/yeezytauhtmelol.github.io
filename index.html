<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jim's Website.</title>
  <link rel="icon" type="image/x-icon" href="calvin.ico">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter&family=Playfair+Display&display=swap" rel="stylesheet">
  <style>
    /* Reset & base styles */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; line-height: 1.6; background: url('https://i.pinimg.com/originals/d8/c9/1a/d8c91a38ba7965bcc7ad62335ae279a7.gif') top center / cover; color: #fff; }
    body::before { content: ''; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: -1; }
    /* Header & nav */
    header { position: sticky; top:0; background: rgba(0,0,0,0.6); padding: 15px 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
    nav ul { display: flex; justify-content: center; list-style: none; }
    nav li { margin: 0 15px; }
    nav a { text-decoration: none; color: #fff; font-weight: 500; }
    /* Hero Section */
    .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: transparent; }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: 3rem; margin-bottom: 15px; }
    .hero p { font-size: 1.25rem; color: #ddd; }
    /* Sections */
    section { padding: 80px 20px; max-width: 900px; margin: auto; }
    h2 { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 20px; text-align: center; }
    /* Contact Form */
    form { display: flex; flex-direction: column; gap: 15px; }
    input, textarea { padding: 10px; font-size: 1rem; border: 1px solid #555; border-radius: 5px; background: rgba(255,255,255,0.1); color: #fff; }
    button { padding: 12px; font-size: 1rem; border: none; border-radius: 5px; background: #111; color: #fff; cursor: pointer; transition: 0.3s; }
    button:hover { background: #444; }
    button:disabled { background: #888; cursor: not-allowed; }
    /* Footer */
    footer { text-align: center; padding: 20px; background: #111; color: #fff; }
    /* Smooth scroll */
    html { scroll-behavior: smooth; }
    /* Responsive */
    @media(max-width:600px){ .hero h1 { font-size:2.2rem; } .hero p { font-size:1rem; } }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <nav>
      <ul>
        <li><a href="#about">About Me</a></li>
        <li><a href="#discord">Discord</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </header>
  <!-- Hero Section -->
  <section class="hero">
    <h1>Hello, I'm Jim</h1>
    <p>Welcome to my personal website.</p>
  </section>
  <!-- About Section -->
  <section id="about">
    <h2>About Me</h2>
    <p>I love tcc, I am apart of the true crime community. I love movies like elephant, zero day etc.</p>
  </section>
  <!-- Discord Section -->
  <section id="discord">
    <h2>Discord</h2>
    <p><iframe src="https://discord.com/widget?id=1478169703259181189&theme=dark" width="350" height="500" allowtransparency="true" frameborder="0" sandbox="allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts"></iframe></p>
  </section>
  <!-- Music Section (no nav tab) -->
  <section id="music">
    <h2>Now Playing</h2>
    <audio controls style="width:100%;">
      <source src="VIDEOCLUB.mp3" type="audio/mpeg">
    </audio>
  </section>
  <!-- Contact Section -->
  <section id="contact">
    <h2>Contact Me</h2>
    <form id="contact-form">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <textarea name="message" placeholder="Your Message" rows="5" required></textarea>
      <button type="submit" id="submit-btn">Send</button>
    </form>
    <p id="response" style="margin-top:10px;"></p>
  </section>
  <!-- Footer -->
  <footer>
    © 2026 Jim | Follow me on social media
  </footer>
  <script>
    const FORMSPREE_ID = "xeelbrkr";

    document.getElementById("contact-form").addEventListener("submit", async function(e) {
      e.preventDefault();

      const btn = document.getElementById("submit-btn");
      const responseEl = document.getElementById("response");
      const form = e.target;

      btn.disabled = true;
      btn.innerText = "Sending...";
      responseEl.style.color = "";
      responseEl.innerText = "";

      const data = {
        name: form.name.value,
        email: form.email.value,
        message: form.message.value
      };

      try {
        const res = await fetch(`https://formspree.io/f/${FORMSPREE_ID}`, {
          method: "POST",
          headers: { "Content-Type": "application/json", "Accept": "application/json" },
          body: JSON.stringify(data)
        });

        if (res.ok) {
          responseEl.style.color = "green";
          responseEl.innerText = "✅ Thank you! Your message has been sent.";
          form.reset();
        } else {
          const json = await res.json();
          responseEl.style.color = "red";
          responseEl.innerText = "❌ Error: " + (json.error || "Something went wrong. Please try again.");
        }
      } catch (err) {
        responseEl.style.color = "red";
        responseEl.innerText = "❌ Network error. Please try again.";
      }

      btn.disabled = false;
      btn.innerText = "Send";
    });
  </script>
</body>
</html>
